# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  DOCKER_IMAGE: golang:alpine
  ORG_ROOT:
    sh: dirname "{{.USER_WORKING_DIR}}"

tasks:
  gen:
    desc: Regenerate OpenAPI server code
    cmds:
      - go generate ./transport/http/openapi/...

  test-u:
    desc: Unit tests
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/workspace" \
          -v "{{.ORG_ROOT}}/res:/opt/github/res" \
          -v "{{.ORG_ROOT}}/sdi:/opt/github/sdi" \
          -w /workspace \
          {{.DOCKER_IMAGE}} \
          sh -c "go test -v ./..."

  test-m:
    desc: Mutation tests (avito-tech/go-mutesting)
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/workspace" \
          -v "{{.ORG_ROOT}}/res:/opt/github/res" \
          -v "{{.ORG_ROOT}}/sdi:/opt/github/sdi" \
          -w /workspace \
          {{.DOCKER_IMAGE}} \
          sh -c "apk add --no-cache build-base git diffutils && \
            go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest && \
            go-mutesting ./..."

  test:
    desc: All tests (unit + mutation)
    cmds:
      - task: test-u
      - task: test-m
